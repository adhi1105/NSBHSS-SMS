{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Changed | NSHSS Mannar</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --theme-dark: #0f3822;
            --theme-accent: #cbfb45;
            --bg-light: #fdfdfc;
            --text-main: #1a1a1a;
            --text-muted: #64748b;
        }

        body, html {
            height: 100%;
            margin: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-light);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .success-card {
            background: white;
            padding: 50px 40px;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.05);
            max-width: 500px;
            width: 100%;
            text-align: center;
            animation: scaleUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes scaleUp {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        .icon-circle {
            width: 80px;
            height: 80px;
            background: var(--theme-accent);
            color: var(--theme-dark);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            margin: 0 auto 30px;
            box-shadow: 0 10px 20px rgba(203, 251, 69, 0.3);
        }

        h2 { font-weight: 800; font-size: 1.8rem; margin-bottom: 15px; letter-spacing: -0.5px; }
        p { color: var(--text-muted); line-height: 1.6; margin-bottom: 30px; }

        .btn-login {
            background: var(--theme-dark);
            color: white;
            border-radius: 12px;
            padding: 12px 30px;
            font-weight: 700;
            text-decoration: none;
            transition: 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-login:hover {
            background: var(--theme-accent);
            color: var(--theme-dark);
            transform: translateY(-2px);
        }
    </style>
</head>

<body>
    <div class="success-card">
        <div class="icon-circle">
            <i class="bi bi-check-all"></i>
        </div>
        <h2>Password Updated.</h2>
        <p>Your credentials have been successfully reset. You can now use your new password to sign in to the Eduplex portal.</p>
        
        <a href="{% url 'login' %}" class="btn-login">
            Sign In Now <i class="bi bi-arrow-right"></i>
        </a>
    </div>
</body>
</html>
