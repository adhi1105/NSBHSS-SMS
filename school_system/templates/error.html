{% extends 'base.html' %}

{% block content %}
<div class="container d-flex align-items-center justify-content-center" style="min-height: 80vh;">
    <div class="text-center p-5 shadow-sm rounded-4 bg-white" style="max-width: 600px; width: 100%;">
        <div class="text-danger mb-4">
            <i class="bi bi-exclamation-circle-fill" style="font-size: 4rem;"></i>
        </div>
        
        <h2 class="fw-bold mb-3 text-dark">Access Issue</h2>
        
        <div class="alert alert-danger border-0 bg-danger-subtle text-danger mb-4">
            {{ message|default:"An unexpected error occurred." }}
        </div>

        <p class="text-muted mb-4">
            Your account might be missing a required profile (Student/Staff) to view this dashboard.
        </p>

        <div class="d-flex gap-2 justify-content-center">
            <a href="{% url 'login' %}" class="btn btn-outline-secondary rounded-pill px-4">
                <i class="bi bi-arrow-left me-2"></i>Back to Login
            </a>
            <a href="/" class="btn btn-dark rounded-pill px-4">
                <i class="bi bi-house-door me-2"></i>Home
            </a>
        </div>
    </div>
</div>
{% endblock %}
